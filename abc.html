<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#111;
    color:#fff;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    font-size:24px;
}

.cart{
    font-size:18px;
}

.products{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:#fff;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    padding:20px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:15px 0;
}

.price{
    color:green;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:#fff;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
}

footer{
    text-align:center;
    padding:15px;
    background:#111;
    color:#fff;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>📱 My Mobile Shop</h1>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Phone">
        <h3>iPhone 15</h3>
        <div class="price">₹79,999</div>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Phone">
        <h3>Samsung Galaxy S24</h3>
        <div class="price">₹74,999</div>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Phone">
        <h3>OnePlus 12</h3>
        <div class="price">₹64,999</div>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</section>

<footer>
    © 2026 My Mobile Shop | All Rights Reserved
</footer>

<script>
let cartCount = 0;

function addToCart(){
    cartCount++;
    document.getElementById("cart-count").innerText = cartCount;
    alert("Product added to cart!");
}
</script>

</body>
</html>
